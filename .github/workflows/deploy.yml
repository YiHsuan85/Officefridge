name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main # 當你寫好程式碼推送到 main 分支時，觸發自動打包

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Install and Build 🔧
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          
      - name: Build Project
        run: |
          npm install
          npm run build

      - name: Deploy 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist # 自動把編譯好的 dist 資料夾推送到 gh-pages 分支
